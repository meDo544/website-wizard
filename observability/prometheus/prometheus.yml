global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  # ---------------------------------------------------------------------------
  # FastAPI backend metrics (REAL app on port 8002)
  # ---------------------------------------------------------------------------
  - job_name: "website-wizard-backend"
    static_configs:
      - targets:
          - backend:8000

  # ---------------------------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets:
          - localhost:9090
