# ================================
# Alembic Configuration
# ================================

[alembic]

# Path to migration scripts
script_location = migrations

# Ensure project root is on PYTHONPATH
prepend_sys_path = .

# Use OS-specific path separator
path_separator = os

# Database URL (not used directly if env.py overrides it)
sqlalchemy.url = postgresql://placeholder


# ================================
# Post Write Hooks (optional)
# ================================

[post_write_hooks]


# ================================
# Logging Configuration
# ================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
